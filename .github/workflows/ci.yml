name: CI and GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      base_url:
        description: "Base URL path for the build (e.g. /jwt-webtool/ or /)"
        required: false
        default: ""

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Security audit
        run: pnpm audit

      - name: Run tests
        run: pnpm test

      - name: Build default bundle
        run: pnpm run build

      - name: Build GitHub Pages bundle
        run: pnpm run build:pages
        env:
          BASE_URL: /${{ github.event.repository.name }}/

  deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve base URL
        id: base_url
        run: |
          if [ -n "${{ github.event.inputs.base_url }}" ]; then
            BASE_URL="${{ github.event.inputs.base_url }}"
          else
            BASE_URL="/${{ github.event.repository.name }}/"
          fi
          if [ "$BASE_URL" != "/" ] && [ "${BASE_URL: -1}" != "/" ]; then
            BASE_URL="${BASE_URL}/"
          fi
          if [ "${BASE_URL:0:1}" != "/" ]; then
            BASE_URL="/${BASE_URL}"
          fi
          echo "value=${BASE_URL}" >> "$GITHUB_OUTPUT"

      - name: Build for GitHub Pages
        run: pnpm run build:pages
        env:
          BASE_URL: ${{ steps.base_url.outputs.value }}

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4